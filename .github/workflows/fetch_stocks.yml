name: Fetch NSE Stock Data

on:
  schedule:
    - cron: '45 3 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run fetch script
        run: python ingestion/fetch_stock_data.py

      - name: Commit and push updated DB
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add database/stock_data.db
          git commit -m "Auto fetch: $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push