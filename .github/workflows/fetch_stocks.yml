name: Fetch NSE Stock Data

on:
  schedule:
    - cron: '0 12 * * 1-5' # 5:30 PM IST
  workflow_dispatch: 

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run fetch script
        run: python ingestion/fetch_stock_data.py

      - name: Commit and push updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # This forces git to see the database file even if it wants to ignore it
          git add -f **/*.db
          
          # This will commit and push only if there's actually a change
          git commit -m "Fixed Auto-update: $(date)" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}