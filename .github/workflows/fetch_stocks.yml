name: Fetch NSE Stock Data

on:
  schedule:
    # Runs at 12:00 UTC (5:30 PM IST) 
    # This ensures the final "snapshot" price of the day is 100% accurate.
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Gives the robot permission to save the file
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run fetch script
        run: python ingestion/fetch_stock_data.py

      - name: Commit and push updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # This command finds every .db file and adds it, no matter the folder
          find . -name "*.db" -exec git add {} +
          
          # Only commit if something actually changed
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update prices: $(date)"
            git push
          else
            echo "No changes detected in the database."
          fi